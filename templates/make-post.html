{{define "make-posts"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadSpace — New Post</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- NAVBAR (Logged-in State) -->
  <header class="navbar">
    <div class="navbar__inner">
      <a href="/" class="navbar__brand">
        <span class="navbar__brand-icon">✦</span>
        <span>ThreadSpace</span>
      </a>
      <nav class="navbar__links">
        <a href="/" class="navbar__link">Home</a>
        <a href="/posts" class="navbar__link">View Posts</a>
        <a href="/make-posts" class="navbar__link navbar__link--active">Make Post</a>
        <a href="/logout" class="btn btn--ghost btn--sm">Logout</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="container">

      <div class="make-post-header">
        <h1 class="make-post-header__title">New Post</h1>
        <p class="make-post-header__sub">Share your thoughts with the ThreadSpace community.</p>
      </div>

      <div class="make-post-card">
        <form action="/make-posts" method="POST">

          <div class="form-group">
            <label class="form-label" for="post-title">Title</label>
            <input
              class="form-input"
              type="text"
              id="post-title"
              name="title"
              placeholder="Give your post a compelling title"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="post-content">Content</label>
            <textarea
              class="form-input"
              id="post-content"
              name="content"
              placeholder="Write your post here..."
              required
            ></textarea>
          </div>

          <div class="make-post-actions">
            <button type="submit" class="btn btn--primary">
              Publish Post
            </button>
            <a href="/post" class="btn btn--secondary">
              Cancel
            </a>
            <!-- Logout -->
            <a href="/login" class="btn btn--danger btn--sm">
              Logout
            </a>
          </div>

        </form>
      </div>

    </div>
  </main>

</body>
</html>
{{end}}
